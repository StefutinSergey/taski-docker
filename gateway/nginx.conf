server {
  listen 80;

  # Встроенный DNS Docker
  resolver 127.0.0.11 valid=30s;

  location /api/ {
    set $backend_upstream backend:8000;
    proxy_set_header Host $http_host;
    proxy_pass http://$backend_upstream/api/;
  }

  location /admin/ {
    set $backend_upstream backend:8000;
    proxy_set_header Host $http_host;
    proxy_pass http://$backend_upstream/admin/;
  }

  location / {
    alias /staticfiles/;
    index index.html;
  }
}